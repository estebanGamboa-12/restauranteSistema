<svg width="240" height="64" viewBox="0 0 240 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Plan Beach Restaurante Valencia">
  <!-- Icono: sol y ola -->
  <g transform="translate(16,12)">
